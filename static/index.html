<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENEL - Chats de llamadas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111b21;
      color: #e9edef;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 360px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #222d34;
      background: #111b21;
    }

    #sidebar-header {
      padding: 16px 20px;
      background: #202c33;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e9edef;
    }

    #sidebar-header .logo {
      width: 38px;
      height: 38px;
      background: #00a884;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    #search-bar {
      padding: 8px 12px;
      background: #111b21;
    }

    #search-bar input {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      background: #202c33;
      color: #e9edef;
      font-size: 14px;
      outline: none;
    }

    #search-bar input::placeholder { color: #8696a0; }

    #client-list {
      flex: 1;
      overflow-y: auto;
    }

    .client-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #222d34;
      transition: background 0.15s;
    }

    .client-item:hover { background: #202c33; }
    .client-item.active { background: #2a3942; }

    .client-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #374045;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .client-info { flex: 1; overflow: hidden; }

    .client-name {
      font-size: 15px;
      font-weight: 500;
      color: #e9edef;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .client-preview {
      font-size: 13px;
      color: #8696a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .client-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .client-date { font-size: 11px; color: #8696a0; }

    .call-badge {
      background: #00a884;
      color: #111b21;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
    }

    /* ── Chat panel ── */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0b141a;
    }

    #chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #8696a0;
      gap: 12px;
    }

    #chat-empty .icon { font-size: 64px; opacity: 0.3; }
    #chat-empty p { font-size: 15px; }

    #chat-header {
      display: none;
      padding: 10px 20px;
      background: #202c33;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid #222d34;
    }

    #chat-header .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #374045;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    #chat-header-info h2 { font-size: 16px; font-weight: 500; }
    #chat-header-info p { font-size: 13px; color: #8696a0; }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* background pattern */
    #chat-messages {
      background-color: #0b141a;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23182229' fill-opacity='0.6'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .resumen-card {
      background: #1d2b30;
      border: 1px solid #2a3942;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 6px 0 12px;
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .resumen-item {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #2a3942;
      border-radius: 6px;
      padding: 3px 8px;
      color: #e9edef;
    }

    .resumen-label { color: #8696a0; font-size: 11px; }

    .resultado-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .resultado-tecnico { background: #ff6b35; color: #fff; }
    .resultado-cerrado { background: #00a884; color: #111; }
    .resultado-otro { background: #374045; color: #8696a0; }

    .session-separator {
      text-align: center;
      margin: 16px 0 8px;
    }

    .session-separator span {
      background: #182229;
      color: #8696a0;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid #2a3942;
    }

    .bubble-row {
      display: flex;
      margin: 1px 0;
    }

    .bubble-row.assistant { justify-content: flex-start; }
    .bubble-row.user { justify-content: flex-end; }

    .bubble {
      max-width: 65%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      position: relative;
    }

    .bubble-row.assistant .bubble {
      background: #202c33;
      color: #e9edef;
      border-top-left-radius: 2px;
    }

    .bubble-row.user .bubble {
      background: #005c4b;
      color: #e9edef;
      border-top-right-radius: 2px;
    }

    .bubble-label {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .bubble-row.assistant .bubble-label { color: #00a884; }
    .bubble-row.user .bubble-label { color: #7dd3c2; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374045; border-radius: 3px; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="logo">⚡</div>
    <h1>ENEL Llamadas</h1>
  </div>
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="Buscar cliente..." oninput="filtrarClientes()" />
  </div>
  <div id="client-list"></div>
</div>

<div id="chat-panel">
  <div id="chat-empty">
    <div class="icon">💬</div>
    <p>Selecciona un cliente para ver su historial</p>
  </div>
  <div id="chat-header">
    <div class="avatar">👤</div>
    <div id="chat-header-info">
      <h2 id="header-nombre"></h2>
      <p id="header-detalle"></p>
    </div>
  </div>
  <div id="chat-messages"></div>
</div>

<script>
  let todosLosClientes = [];
  let clienteActivo = null;

  async function cargarClientes() {
    const res = await fetch('/api/clientes');
    todosLosClientes = await res.json();
    renderizarLista(todosLosClientes);
  }

  function filtrarClientes() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtrados = todosLosClientes.filter(c =>
      c.nombre.toLowerCase().includes(q) ||
      c.telefono.includes(q) ||
      (c.ubicacion || '').toLowerCase().includes(q)
    );
    renderizarLista(filtrados);
  }

  function renderizarLista(clientes) {
    const list = document.getElementById('client-list');
    list.innerHTML = '';

    if (clientes.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:#8696a0;font-size:14px;">Sin resultados</div>';
      return;
    }

    for (const c of clientes) {
      const item = document.createElement('div');
      item.className = 'client-item' + (clienteActivo === c.telefono ? ' active' : '');
      item.dataset.telefono = c.telefono;

      const fecha = c.ultima_llamada
        ? new Date(c.ultima_llamada).toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit' })
        : '';

      item.innerHTML = `
        <div class="client-avatar">👤</div>
        <div class="client-info">
          <div class="client-name">${c.nombre}</div>
          <div class="client-preview">${c.ultimo_mensaje || c.ubicacion || c.telefono}</div>
        </div>
        <div class="client-meta">
          <div class="client-date">${fecha}</div>
          <div class="call-badge">${c.total_llamadas} llamada${c.total_llamadas !== 1 ? 's' : ''}</div>
        </div>
      `;

      item.addEventListener('click', () => abrirChat(c.telefono));
      list.appendChild(item);
    }
  }

  async function abrirChat(telefono) {
    clienteActivo = telefono;

    // marcar activo en lista
    document.querySelectorAll('.client-item').forEach(el => {
      el.classList.toggle('active', el.dataset.telefono === telefono);
    });

    const res = await fetch(`/api/chat/${telefono}`);
    if (!res.ok) return;
    const data = await res.json();

    // header
    document.getElementById('chat-empty').style.display = 'none';
    const header = document.getElementById('chat-header');
    header.style.display = 'flex';
    document.getElementById('header-nombre').textContent = data.nombre;
    document.getElementById('header-detalle').textContent =
      `${data.telefono}${data.ubicacion ? ' · ' + data.ubicacion : ''}`;

    // mensajes
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';

    for (const llamada of data.llamadas) {
      const sep = document.createElement('div');
      sep.className = 'session-separator';
      sep.innerHTML = `<span>📞 Llamada — ${formatearFecha(llamada.fecha)}</span>`;
      container.appendChild(sep);

      if (llamada.resumen) {
        const r = llamada.resumen;
        const resultadoClase = r.resultado === 'tecnico_asignado' ? 'resultado-tecnico'
          : r.resultado === 'ticket_cerrado' ? 'resultado-cerrado' : 'resultado-otro';
        const resultadoTexto = {
          tecnico_asignado: '🔧 Técnico asignado',
          ticket_cerrado: '✅ Ticket cerrado',
          numero_equivocado: '❌ Número equivocado',
          no_en_casa: '🏠 No estaba en casa',
          no_contesto: '📵 No contestó',
        }[r.resultado] || r.resultado;

        const card = document.createElement('div');
        card.className = 'resumen-card';
        card.innerHTML = `
          <div class="resumen-item">
            <span class="resumen-label">Servicio</span>
            ${ r.tiene_servicio === 'si' ? '✅ Con servicio' : r.tiene_servicio === 'no' ? '❌ Sin servicio' : '— No verificado' }
          </div>
          ${ r.sector ? `<div class="resumen-item"><span class="resumen-label">Sector</span> ${escapeHtml(r.sector)}</div>` : '' }
          ${ r.tipo_afectacion && r.tipo_afectacion !== 'null' ? `<div class="resumen-item"><span class="resumen-label">Afectación</span> ${r.tipo_afectacion.replace('_', ' ')}</div>` : '' }
          <div class="resultado-badge ${resultadoClase}">${resultadoTexto}</div>
        `;
        container.appendChild(card);
      }

      for (const msg of llamada.mensajes) {
        if (msg.role === 'system') continue;
        const row = document.createElement('div');
        row.className = `bubble-row ${msg.role}`;

        const label = msg.role === 'assistant' ? 'ENEL Agente' : 'Cliente';
        row.innerHTML = `
          <div class="bubble">
            <div class="bubble-label">${label}</div>
            ${escapeHtml(msg.content)}
          </div>
        `;
        container.appendChild(row);
      }
    }

    container.scrollTop = container.scrollHeight;
  }

  function formatearFecha(fechaStr) {
    const d = new Date(fechaStr);
    return d.toLocaleString('es-CO', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  cargarClientes();
  // auto-refresh cada 30 segundos por si llegan llamadas nuevas
  setInterval(cargarClientes, 30000);
</script>
</body>
</html>
